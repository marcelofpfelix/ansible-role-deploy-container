- name: Validate service settings {{ service_name }}
  ansible.builtin.assert:
    that:
      - service_name | length > 0
      - deploy_service_runtime in ['command', 'container']
      - deploy_service_runtime == 'container' or service_exec_start | length > 0
    fail_msg: "Set service_name and service_exec_start for command services, or set container for container services."

- name: Include vars {{ service_name }}
  ansible.builtin.include_vars:
    file: "{{ container_var_path }}"
  when: container_var

- name: Include files
  ansible.builtin.include_tasks: files.yml

- name: Include docker
  ansible.builtin.include_tasks: docker.yml
  when: deploy_service_runtime == 'container'

- name: Include restart
  ansible.builtin.include_tasks: restart.yml
