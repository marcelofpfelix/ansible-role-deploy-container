---
- name: Create main directory
  ansible.builtin.file:
    state: directory
    mode: "{{ docker_dir_mode }}"
    path: "{{ service_config_dir }}"

- name: Create volume directory
  ansible.builtin.file:
    state: directory
    mode: "{{ docker_dir_mode }}"
    path: "{{ service_data_dir }}{{ service_name }}"
  when: deploy_service_runtime == 'container' or copy_files or copy_template

- name: Create launchd directories
  ansible.builtin.file:
    state: directory
    mode: "0755"
    path: "{{ item }}"
  loop:
    - "{{ macos_launchd_dir }}"
    - "{{ macos_launchd_script_dir }}"
    - "{{ macos_launchd_log_dir }}"
  when: deploy_service_is_darwin | bool

- name: Template env file {{ service_name }}
  ansible.builtin.template:
    src: templates/template.env.j2
    dest: "{{ service_config_dir }}/{{ service_name }}.env"
    mode: "0644"
  register: env
  no_log: "{{ deploy_service_no_log }}"
  when: deploy_service_runtime == 'container'

- name: Template launchd wrapper {{ service_name }}
  ansible.builtin.template:
    src: templates/service.launchd.sh.j2
    dest: "{{ macos_launchd_script_path }}"
    mode: "0755"
  register: launchd_script
  when: deploy_service_is_darwin | bool

- name: Template service file {{ service_name }}
  ansible.builtin.template:
    src: "{{ service_template }}"
    dest: "{{ service_unit_path }}"
    mode: "0644"
  register: service_file

- name: Validate launchd plist {{ service_name }}
  ansible.builtin.command:
    argv:
      - plutil
      - -lint
      - "{{ service_unit_path }}"
  changed_when: false
  when: deploy_service_is_darwin | bool

- name: Copy files
  ansible.posix.synchronize:
    src: "{{ service_files_src }}"
    dest: "{{ service_data_dir }}{{ service_name }}"
    recursive: true
  when: copy_files

- name: Copy templates {{ service_name }}
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ service_data_dir }}{{ service_name }}/{{ item.path }}"
    mode: "0644"
  with_community.general.filetree: "{{ service_templates_src }}"
  when: copy_template and item.state == 'file'
